apiVersion: postgresql.cnpg.io/v1
kind: Cluster

metadata:
  name: timescale-postgres
  namespace: default

spec:
  instances: 1
  imageName: ghcr.io/clevyr/cloudnativepg-timescale:17.13-ts2.26.4

  imagePullPolicy: Always

  storage:
    size: 1Gi

  postgresql:
    shared_preload_libraries:
      - timescaledb
      - pg_stat_statements

  bootstrap:
    initdb:
      database: app
      owner: appuser
      secret:
        name: app-user-secret
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements;

