apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: acid-minimal-cluster
spec:
  teamId: "acid"
  volume:
    size: 1Gi
  numberOfInstances:  1
  users:
    zalando:  # database owner
    - superuser
    - createdb
    foo_user: []  # role for application foo
  preparedDatabases:
    app:
      defaultUsers: true
      extensions:
        timescaledb: public
  postgresql:
    version: "17"

  env:
    - name: TIMESCALEDB_APACHE_ONLY
      value: "false"
