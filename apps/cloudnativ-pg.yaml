apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.26.0
    helm:
      values: |
        crds:
          create: true

  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true              # lets the API server handle field ownership, avoids ConfigMap conflicts
      - SkipDryRunOnMissingResource=true  # stops the "pooler CRD missing" dry-run failure
      - ApplyOutOfSyncOnly=true           # only touches resources that are actually out of sync