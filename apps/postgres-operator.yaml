# 1. CRDs-only Application (sync-wave: -1, runs first)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.26.0
    helm:
      values: |
        crds:
          create: true
        operator:
          enabled: false   # skip the operator deployment here
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true        # needed for CRD upgrades

---
# 2. Operator Application (sync-wave: 0, runs after CRDs are ready)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.26.0
    helm:
      values: |
        crds:
          create: false    # CRDs already applied above
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true